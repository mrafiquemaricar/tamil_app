<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>பொருத்தமான தமிழ் வார்த்தையைக் கண்டுபிடி </title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
      text-align: center;
    }

    .home {
      display: flex;
      justify-content: center;
      /* Horizontal center */
      margin-top: 20px;
      /* Add space from top if needed */
    }

    h1 {
      color: #00f;
      text-align: center;
    }

    #categorySelect {
      width: 100%;
      max-width: 400px;
      padding: 10px;
      font-size: 1.1em;
      margin-bottom: 20px;
      text-align: center;
    }

    .flashcard {
      width: 90%;
      max-width: 400px;
      height: 250px;
      margin: 20px auto;
      perspective: 1000px;
      cursor: pointer;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      text-align: center;
      transition: transform 0.6s;
      transform-style: preserve-3d;
    }

    .card-inner.flipped {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.2em;
      padding: 20px;
      box-sizing: border-box;
      border-radius: 10px;
    }

    .card-front {
      background: silver;
      font-size: 24pt;
    }

    .card-back {
      background: yellow;
      font-size: 24pt;
      transform: rotateY(180deg);
    }

    .controls {
      margin-top: 70px;
    }

    .controls button {
      padding: 10px 15px;
      margin: 0 5px;
      font-size: 2.5em;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background: #0000ff;
      color: white;
    }

    .controls button:hover {
      background: #ffa500;
    }

    #home {
      text-decoration: none;
      background-color: #0000ff;
      color: #ffffff;
      padding: 10px;
      border-radius: 15px;
    }
  </style>

  <link rel="stylesheet" href="css/auth.css" />
  <script src="js/auth.js"></script>
  <script>
    TamilAuth.initPage();
  </script>
</head>

<body>

    <div class="home">
        <a id="home" href="index.html"> ◀ முகப்பு</a>
    </div>

  <h1>பொருத்தமான தமிழ் வார்த்தையைக் கண்டுபிடி </h1>
  <select id="categorySelect">
    <option value="">-- தேர்வு செய்யவும் --</option>
  </select>
  <div class="flashcard" id="flashcard">
    <div> <p>இரு புற அட்டை </p> </div>
    <div class="card-inner" id="cardInner">
      <div class="card-face card-front" id="question"></div>
      <div class="card-face card-back" id="answer"></div>
    </div>
  </div>
  <div class="controls">
    <button id="readBtn">🔊</button>
    <button id="nextBtn">▶</button>
  </div>
  <script>
    const sheetUrl = 'word_list.csv';
    let cards = [];
    let currentIndex = 0;

    fetch(sheetUrl)
      .then(res => res.text())
      .then(text => {
        const rows = text.split(/\r?\n/).map(r => r.split(','));
        const headers = rows.shift().map(h => h.toLowerCase());
        const catIdx = headers.indexOf('category');
        const qIdx = headers.indexOf('english');
        const aIdx = headers.indexOf('tamil');
        cards = rows.map(r => ({
          category: r[catIdx] || '',
          question: r[qIdx] || '',
          answer: r[aIdx] || ''
        }));
        loadCategories();
      });

    function loadCategories() {
      const select = document.getElementById('categorySelect');
      const categories = [...new Set(cards.map(c => c.category))].sort();
      categories.forEach(cat => {
        const opt = document.createElement('option');
        opt.value = cat;
        opt.textContent = cat;
        select.appendChild(opt);
      });
      select.addEventListener('change', () => {
        currentIndex = 0;
        showCard();
      });
      showCard();
    }

    function showCard() {
      const category = document.getElementById('categorySelect').value;
      const filtered = cards.filter(c => c.category === category);
      if (filtered.length === 0) return;
      const card = filtered[currentIndex % filtered.length];
      document.getElementById('question').textContent = card.question;
      document.getElementById('answer').textContent = card.answer;
      document.getElementById('cardInner').classList.remove('flipped');
    }

    document.getElementById('flashcard').addEventListener('click', () => {
      document.getElementById('cardInner').classList.toggle('flipped');
    });

    document.getElementById('nextBtn').addEventListener('click', () => {
      const category = document.getElementById('categorySelect').value;
      const filtered = cards.filter(c => c.category === category);
      currentIndex = (currentIndex + 1) % filtered.length;
      showCard();
    });

    document.getElementById('readBtn').addEventListener('click', () => {
      const cardInner = document.getElementById('cardInner');
      const category = document.getElementById('categorySelect').value;
      const filtered = cards.filter(c => c.category === category);
      if (filtered.length === 0) return;
      const card = filtered[currentIndex % filtered.length];
      const isFlipped = cardInner.classList.contains('flipped');
      const textToRead = isFlipped ? card.answer : card.question;

      const utterance = new SpeechSynthesisUtterance(textToRead);
      utterance.lang = isFlipped ? 'ta-IN' : 'en-US';
      speechSynthesis.speak(utterance);
    });
  </script>
</body>

</html>
