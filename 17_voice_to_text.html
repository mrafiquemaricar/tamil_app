<!DOCTYPE html>
<html lang="ta">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>குரல் → தமிழ் தட்டச்சு</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      margin: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      box-sizing: border-box;
    }

    #home {
      text-decoration: none;
      background-color: #0000ff;
      color: #ffffff;
      padding: 10px;
      border-radius: 15px;
      width: 100px;
      display: block;
      margin: 0 auto 20px;
      text-align: center;
    }

    h1 {
      color: #00f;
      text-align: center;
      margin-bottom: 50px;
    }

    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    button {
      padding: 12px 24px;
      font-size: 18px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      background-color: #00f;
      color: white;
    }

    button:disabled {
      background-color: #aaa;
    }

    .controls {
      margin-bottom: 10px;
      text-align: center;
      /* add this */
    }

    .controls button {
      padding: 8px 16px;
      font-size: 18px;
      margin: 20px 0px;
      border: none;
      border-radius: 5px;
      background-color: #666;
      color: white;
      cursor: pointer;
    }

    .controls button:hover {
      background-color: #444;
    }

    #transcript {
      font-size: 16px;
      color: #333;
      width: 90%;
      text-align: center;
      word-wrap: break-word;
      border: 1px solid #333;
      background-color: #f0f0f0;
      min-height: 300px;
      max-height: 300px;
      overflow-y: auto;
      padding: 10px;
    }

    #recognizedText {
      font-style: normal;
    }

    #helpText {
      color: gray;
      font-style: italic;
    }
  </style>
</head>

<body>

  <a id="home" href="index.html"> ◀ முகப்பு</a>

  <h1>குரல் → தமிழ் தட்டச்சு</h1>

  <div class="container">
    <div>
      <button id="startBtn">ஆரம்பிக்க...</button>
      <button id="stopBtn" disabled>நிறுத்த...</button>
    </div>

    <p> <i> நுண்ணறிவு உங்கள் குரலை சரியாக தட்டச்சு செய்ய மிகவும் முயற்சி செய்கிறது. </i></p>
    <div id="transcript" contenteditable="true">
      <span id="recognizedText"></span>
      <span id="helpText">🎤 பேசவும்...</span>
    </div>

    <div class="controls">
      <span id="wordCount">வார்த்தைகள்: 0</span> <!-- Word count display -->
      <br>
      <button id="selectAllBtn">அனைத்தையும் தேர்ந்தெடுக்க</button>
      <button id="copyBtn">நகல் எடுக்க</button>
      <button id="clearBtn">அழிக்க</button> <!-- Clear button -->

    </div>
  </div>

  <script>
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      alert("இந்நிரல் உங்கள் உலாவியில் ஆதரவாக இல்லை.");
    } else {
      const recognition = new SpeechRecognition();
      recognition.lang = 'ta-IN';
      recognition.interimResults = true;
      recognition.continuous = false;

      const startBtn = document.getElementById('startBtn');
      const stopBtn = document.getElementById('stopBtn');
      const recognizedText = document.getElementById('recognizedText');
      const helpText = document.getElementById('helpText');
      const transcriptDiv = document.getElementById('transcript');
      const selectAllBtn = document.getElementById("selectAllBtn");
      const copyBtn = document.getElementById("copyBtn");
      const clearBtn = document.getElementById('clearBtn');
      const wordCountSpan = document.getElementById('wordCount');

      let finalTranscript = recognizedText.innerText.trim() + " ";
      let listening = false;
      let lastFinal = '';
      let pauseTimer = null;

      recognition.onstart = function () {
        startBtn.disabled = true;
        stopBtn.disabled = false;
        helpText.style.display = "inline";
      };

      recognition.onerror = function (event) {
        console.error(event.error);
        transcriptDiv.innerHTML += "<br><span style='color:red;'>பிழை: " + event.error + "</span>";
        startBtn.disabled = false;
        stopBtn.disabled = true;
      };

      recognition.onresult = function (event) {
        let interimTranscript = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          let text = event.results[i][0].transcript.trim();
          if (event.results[i].isFinal) {
            if (text !== lastFinal) {
              finalTranscript += text;
              lastFinal = text;

              // 2-second pause logic to add full stop
              if (pauseTimer) clearTimeout(pauseTimer);
              pauseTimer = setTimeout(() => {
                finalTranscript += ". ";
                recognizedText.textContent = finalTranscript;
              }, 2000);
            }
          } else {
            interimTranscript += text;
          }
        }
        recognizedText.textContent = finalTranscript + interimTranscript;
        updateWordCount(); // <-- call here after updating text//


      };

      recognition.onend = function () {
        helpText.style.display = "none";
        if (listening) {
          recognition.start();
        } else {
          startBtn.disabled = false;
          stopBtn.disabled = true;
        }
      };

      startBtn.addEventListener('click', function () {
        finalTranscript = recognizedText.innerText.trim() + " ";
        lastFinal = '';
        listening = true;
        recognition.start();
      });

      stopBtn.addEventListener('click', function () {
        listening = false;
        recognition.stop();
        if (pauseTimer) clearTimeout(pauseTimer);
      });

      selectAllBtn.addEventListener("click", () => {
        const range = document.createRange();
        range.selectNodeContents(transcriptDiv);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
      });

      copyBtn.addEventListener("click", () => {
        const text = recognizedText.innerText;
        navigator.clipboard.writeText(text);
      });

      function updateWordCount() {
        // Count words in recognizedText
        let text = recognizedText.innerText.trim();
        let count = text === '' ? 0 : text.split(/\s+/).length;
        wordCountSpan.textContent = "வார்த்தைகள்: " + count;
      }

      // Update word count whenever transcription changes
      transcriptDiv.addEventListener('input', updateWordCount);

      // Clear button functionality
      clearBtn.addEventListener('click', () => {
        recognizedText.textContent = '';
        finalTranscript = '';
        lastFinal = '';
        updateWordCount();
      });
    }
  </script>

</body>

</html>
