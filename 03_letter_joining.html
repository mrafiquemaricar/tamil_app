<!DOCTYPE html>
<html lang="ta">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>எழுத்துக் கூட்டி படிப்போம்</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #fdfdfd;
      text-align: center;
      margin: 0;
    }

    h1 {
      color: #00f;
      text-align: center;
    }

   select {
      font-size: 20px;
      padding: 12px 16px;
      margin: 12px 0;
      width: 100%;
      max-width: 400px;
      border-radius: 8px;
      border: 1px solid #ccc;
      text-align: center;
    }

    #wordContainer div {
      font-size: 30px;
      cursor: pointer;
      user-select: none;
      padding: 12px;
      margin: 10px auto;
      width: 90%;
      max-width: 400px;
      line-height: 1.8;
      border-radius: 8px;
      transition: background-color 0.3s ease, transform 0.2s ease;
      background-color: #e0d4f7;
    }

    #wordContainer div:hover {
      background-color: #b5c5f3;
      transform: scale(1.03);
    }

    #home {
      text-decoration: none;
      background-color: #0000ff;
      color: #ffffff;
      padding: 10px;
      border-radius: 15px;
    }
   
  </style>

</head>

<body>

  <a id="home" href="index.html"> ◀ முகப்பு</a>
  <h1>எழுத்துக் கூட்டி படிப்போம்</h1>

  <select id="categoryFilter">
    <option value="">-- தேர்வு செய்யவும் --</option>
  </select>

  <br />

  <select id="wordFilter" disabled>
    <option value="">-- மேலே தேர்வு செய்யவும் --</option>
  </select>

  <div id="wordContainer"></div>

  <script>
    const uyirLetters = ['அ', 'ஆ', 'இ', 'ஈ', 'உ', 'ஊ', 'எ', 'ஏ', 'ஐ', 'ஒ', 'ஓ', 'ஔ'];
    const meiLetters = ['க்', 'ங்', 'ச்', 'ஞ்', 'ட்', 'ண்', 'த்', 'ந்', 'ப்', 'ம்', 'ய்', 'ர்', 'ல்', 'வ்', 'ழ்', 'ள்', 'ற்', 'ன்'];
    const uyirmeiLetters = ['க', 'கா', 'கி', 'கீ', 'கு', 'கூ', 'கெ', 'கே', 'கை', 'கொ', 'கோ', 'கௌ',
      'ங', 'ஙா', 'ஙி', 'ஙீ', 'ஙு', 'ஙூ', 'ஙெ', 'ஙே', 'ஙை', 'ஙொ', 'ஙோ', 'ஙௌ',
      'ச', 'சா', 'சி', 'சீ', 'சு', 'சூ', 'செ', 'சே', 'சை', 'சொ', 'சோ', 'சௌ',
      'ஞ', 'ஞா', 'ஞி', 'ஞீ', 'ஞு', 'ஞூ', 'ஞெ', 'ஞே', 'ஞை', 'ஞொ', 'ஞோ', 'ஞௌ',
      'ட', 'டா', 'டி', 'டீ', 'டு', 'டூ', 'டெ', 'டே', 'டை', 'டொ', 'டோ', 'டௌ',
      'ண', 'ணா', 'ணி', 'ணீ', 'ணு', 'ணூ', 'ணெ', 'ணே', 'ணை', 'ணொ', 'ணோ', 'ணௌ',
      'த', 'தா', 'தி', 'தீ', 'து', 'தூ', 'தெ', 'தே', 'தை', 'தொ', 'தோ', 'தௌ',
      'ந', 'நா', 'நி', 'நீ', 'நு', 'நூ', 'நெ', 'நே', 'நை', 'நொ', 'நோ', 'நௌ',
      'ப', 'பா', 'பி', 'பீ', 'பு', 'பூ', 'பெ', 'பே', 'பை', 'பொ', 'போ', 'பௌ',
      'ம', 'மா', 'மி', 'மீ', 'மு', 'மூ', 'மெ', 'மே', 'மை', 'மொ', 'மோ', 'மௌ',
      'ய', 'யா', 'யி', 'யீ', 'யு', 'யூ', 'யெ', 'யே', 'யை', 'யொ', 'யோ', 'யௌ',
      'ர', 'ரா', 'ரி', 'ரீ', 'ரு', 'ரூ', 'ரெ', 'ரே', 'ரை', 'ரொ', 'ரோ', 'ரௌ',
      'ல', 'லா', 'லி', 'லீ', 'லு', 'லூ', 'லெ', 'லே', 'லை', 'லொ', 'லோ', 'லௌ',
      'வ', 'வா', 'வி', 'வீ', 'வு', 'வூ', 'வெ', 'வே', 'வை', 'வொ', 'வோ', 'வௌ',
      'ழ', 'ழா', 'ழி', 'ழீ', 'ழு', 'ழூ', 'ழெ', 'ழே', 'ழை', 'ழொ', 'ழோ', 'ழௌ',
      'ள', 'ளா', 'ளி', 'ளீ', 'ளு', 'ளூ', 'ளெ', 'ளே', 'ளை', 'ளொ', 'ளோ', 'ளௌ',
      'ற', 'றா', 'றி', 'றீ', 'று', 'றூ', 'றெ', 'றே', 'றை', 'றொ', 'றோ', 'றௌ',
      'ன', 'னா', 'னி', 'னீ', 'னு', 'னூ', 'னெ', 'னே', 'னை', 'னொ', 'னோ', 'னௌ'];
    const aythaLetter = ["ஃ"];
    const kiranthaLetters = ['ஜ்', 'ஜ', 'ஜா', 'ஜி', 'ஜீ', 'ஜு', 'ஜூ', 'ஜெ', 'ஜே', 'ஜை', 'ஜொ', 'ஜோ', 'ஜௌ',
      'ஷ்', 'ஷ', 'ஷா', 'ஷி', 'ஷீ', 'ஷு', 'ஷூ', 'ஷெ', 'ஷே', 'ஷை', 'ஷொ', 'ஷோ', 'ஷௌ',
      'ஸ்', 'ஸ', 'ஸா', 'ஸி', 'ஸீ', 'ஸு', 'ஸூ', 'ஸெ', 'ஸே', 'ஸை', 'ஸொ', 'ஸோ', 'ஸௌ',
      'ஹ்', 'ஹ', 'ஹா', 'ஹி', 'ஹீ', 'ஹு', 'ஹூ', 'ஹெ', 'ஹே', 'ஹை', 'ஹொ', 'ஹோ', 'ஹௌ',
      'க்ஷ்', 'க்ஷ', 'க்ஷா', 'க்ஷி', 'க்ஷீ', 'க்ஷு', 'க்ஷூ', 'க்ஷெ', 'க்ஷே', 'க்ஷை', 'க்ஷொ', 'க்ஷோ', 'க்ஷெள',
      'ஸ்ரீ'];

    const allLetters = uyirLetters.concat(meiLetters, uyirmeiLetters, aythaLetter, kiranthaLetters);
    const sheetUrl = 'word_list.csv';

    const categoryFilter = document.getElementById('categoryFilter');
    const wordFilter = document.getElementById('wordFilter');
    const wordContainer = document.getElementById('wordContainer');

    let dataRows = [];
    let ttsEnabled = false;

    // Fetch and parse CSV
    fetch(sheetUrl)
      .then(res => res.text())
      .then(csvText => {
        const lines = csvText.trim().split('\n');
        const header = lines[0].split(',');
        const catIndex = header.indexOf('Category');
        const tamilIndex = header.indexOf('Tamil');

        const categoriesSet = new Set();

        for (let i = 1; i < lines.length; i++) {
          const parts = lines[i].split(',');
          const category = parts[catIndex].trim();
          const tamilWord = parts[tamilIndex].trim();

          dataRows.push({ category, tamil: tamilWord });
          categoriesSet.add(category);
        }

        // Populate category filter
        categoriesSet.forEach(cat => {
          const option = document.createElement('option');
          option.value = cat;
          option.textContent = cat;
          categoryFilter.appendChild(option);
        });
      });

    // Enable TTS on first tap anywhere (user gesture)
    document.body.addEventListener('click', function initTTS() {
      ttsEnabled = true;
      const utterance = new SpeechSynthesisUtterance('ஒலி இயக்கப்பட்டது');
      utterance.lang = 'ta-IN';
      //speechSynthesis.speak(utterance);
      document.body.removeEventListener('click', initTTS);
    }, { once: true });

    categoryFilter.onchange = function () {
      wordFilter.innerHTML = '<option value="">-- ஒரு சொல் தேர்வு செய்யவும் --</option>';
      wordContainer.innerHTML = '';
      const selectedCategory = this.value;

      if (!selectedCategory) {
        wordFilter.disabled = true;
        return;
      }

      const filteredWords = dataRows
        .filter(row => row.category === selectedCategory)
        .map(row => row.tamil);

      const uniqueWords = [...new Set(filteredWords)];

      uniqueWords.forEach(word => {
        const option = document.createElement('option');
        option.value = word;
        option.textContent = word;
        wordFilter.appendChild(option);
      });

      wordFilter.disabled = false;
    };

    wordFilter.onchange = function () {
      wordContainer.innerHTML = '<p><i>எழுத்துக் கூட்டல்கள் ஒலிக்கும்</i></p>';
      const selectedWord = this.value;
      if (!selectedWord) return;

      function splitTamilWord(word) {
        const result = []; 
        let i = 0;
        while (i < word.length) {
          let matched = false;
          for (let len = 3; len > 0; len--) {
            if (i + len <= word.length) {
              const part = word.substring(i, i + len);
              if (allLetters.includes(part)) {
                result.push(part);
                i += len;
                matched = true;
                break;
              }
            }
          }
          if (!matched) {
            result.push(word[i]);
            i++;
          }
        }
        return result;
      }

      const chars = splitTamilWord(selectedWord);

      for (let j = 1; j <= chars.length; j++) {
        const line = chars.slice(0, j).join('');
        const div = document.createElement('div');
        div.textContent = line;
        div.onclick = () => {
          if (!ttsEnabled) return;
          const utterance = new SpeechSynthesisUtterance(line);
          utterance.lang = 'ta-IN';
          speechSynthesis.cancel();
          speechSynthesis.speak(utterance);
        };
        wordContainer.appendChild(div);
      }
    };
  </script>
</body>

</html>
