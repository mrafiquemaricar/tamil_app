<!DOCTYPE html>
<html lang="ta">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ஒலி வேறுபாட்டுச் சொற்கள் </title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f0f4f8;
            color: #333;
            max-width: 700px;
            margin: auto;
            text-align: center;
        }

        h1 {
            color: #00f;
            text-align: center;
        }

        .paragraph {
            font-size: 1.5rem;
            line-height: 2.5rem;
            margin-bottom: 2rem;
            user-select: none;
        }

        .line {
            margin-bottom: 1.2rem;
        }

        .blank-container {
            display: inline-flex;
            align-items: center;
            margin: 0 0.3rem;
        }

        .blank {
            display: inline-block;
            min-width: 5rem;
            height: 2rem;
            border: 2px solid #555;
            padding: 0.3rem 0.5rem;
            cursor: pointer;
            vertical-align: bottom;
            text-align: center;
            user-select: none;
            transition: border-color 0.2s ease, background-color 0.2s ease;
        }

        .blank.selected {
            border-color: #007bff;
            background-color: #d0e8ff;
        }

        .blank.correct {
            border-color: #28a745 !important;
            background-color: #d4edda !important;
            color: #155724;
        }

        .blank.incorrect {
            border-color: #dc3545 !important;
            background-color: #f8d7da !important;
            color: #721c24;
        }

        .mark {
            font-size: 1.3rem;
            margin-left: 0.4rem;
            user-select: none;
        }

        .words {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 1rem;
            justify-content: center;
        }

        .word-chunk {
            background-color: #15ff00;
            color: black;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            user-select: none;
            cursor: grab;
            transition: background-color 0.2s ease;
        }

        .word-chunk:hover {
            background-color: #0056b3;
            color: white;
        }

        .word-chunk.used {
            background-color: #a3c8ff;
            color: #004085;
            cursor: default;
        }

        #message {
            margin-top: 1.5rem;
            font-weight: 700;
            font-size: 1.3rem;
            text-align: center;
        }

        #message.success {
            color: #28a745;
        }

        #message.fail {
            color: #dc3545;
        }

        .buttons {
            margin-top: 2rem;
            text-align: center;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
        }

        button {
            background-color: #0000ff;
            border: none;
            color: white;
            font-size: 2.5rem;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        button:hover {
            background-color: #ffa500;
        }

        #home {
            text-decoration: none;
            background-color: #0000ff;
            color: #ffffff;
            padding: 10px;
            border-radius: 15px;
        }
    </style>

  <link rel="stylesheet" href="css/auth.css" />
  <script src="js/auth.js"></script>
  <script>
    TamilAuth.initPage();
  </script>
</head>

<body>

    <a id="home" href="index.html"> ◀ முகப்பு</a>

    <h1>ஒலி வேறுபாட்டுச் சொற்கள்</h1>
    <hr>
    <div class="paragraph" id="paragraph"></div>

    <div class="words" id="wordChunks"></div>

    <div id="message"></div>
    <hr>
    <div class="buttons">
        <button id="checkBtn">✔</button>
        <button id="answerBtn">?</button>
        <button id="resetBtn">↩</button>
        <button id="nextBtn">▶</button>
    </div>

    <script>
        const sentences = [
            "கடலில் /அலை/ பெரிதாக எழுகிறது. அவர்களை இங்கே /அழை/த்து வா .",
            "மரத்தின் /இலை/. மரச் சட்டங்களை /இழை/.",
            "கால் /வலி/. ஒரு /வழி/ப்பாதை.",
            "அந்த பறவையின் /அலகு/ மிக /அழகு/.",
            "விவசாயி /உழவு/ செய்கிறார். ஒற்றன் /உளவு/ பார்க்கிறான்.",
            "குழந்தைக்கு மறு பெயர் /குழவி/. /குளவி/ என்பது ஒரு வகை பூச்சி.",
            "/ஆனி/ ஓர் தமிழ் மாதம். சுவற்றில் அடிப்பது /ஆணி/.",
            "/கனி/ என்றால் பழம். /கணி/ என்றால் கணக்கிடுவது.",
            "/நான்/ என்பது என்னைக் குறிப்பது. /நாண்/ என்பது கயிற்றைக் குறிப்பது.",
            "/பானம்/ என்றால் பருகும் நீர். /பாணம்/ என்றால் அம்பு.",
            "அதிகாலைப் /பனி/த்துளி. இது என் /பணி/.",
            "/மனம்/ என்றால் உள்ளம். /மணம்/ என்றால் வாசனை.",
            "/தன்மை/ என்றால் குணம். /தண்மை/ என்றால் குளிர்ச்சி.",
            "குரங்கின் /வால்/. வீரனின் /வாள்/.",
            "/மலை/யில் ஏறும் போது சரியான /மழை/.",
            "திரு/விழா/. /விலா/ எலும்பு.",
            "சமையல் /அறை/க்குச் சென்று, /அரை/க் குவளை அரிசி எடுத்து வா.",
            "இங்கு /விளை/யும் பயிர் /விலை/ உயர்ந்தது",
            "தன்னந்/தனி/யாய் வேலை செய்கிறார். கோபத்தைத் /தணி/.",
            "/ஏரி/யில் குளித்தது போதும். கரை /ஏறி/ வா.",
            "ஆற்றங்/கரை/. அழுக்குக் /கறை/.",
            "இலை /தழை/. இரும்புத்/தளை/."
        ];

        let shuffledSentences = [];
        let currentQuestionIndex = 0;
        let currentData = null;
        let selectedBlank = null;
        const paragraphDiv = document.getElementById('paragraph');
        const wordChunksDiv = document.getElementById('wordChunks');
        const message = document.getElementById('message');
        const checkBtn = document.getElementById('checkBtn');
        const answerBtn = document.getElementById('answerBtn');
        const resetBtn = document.getElementById('resetBtn');
        const nextBtn = document.getElementById('nextBtn');

        const wordUsage = new Map();

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                const tmp = array[i];
                array[i] = array[j];
                array[j] = tmp;
            }
            return array;
        }

        function prepareQuiz() {
            // ஐதமும் முடிந்துவிட்டால் மாற்றம் செய்யாமல் message காட்டி next ஐ முடக்கு
            if (shuffledSentences.length === 0) {
                shuffledSentences = shuffleArray(sentences.slice());
                currentQuestionIndex = 0;
            }

            if (currentQuestionIndex >= shuffledSentences.length) {
                paragraphDiv.innerHTML = '';
                wordChunksDiv.innerHTML = '';
                message.textContent = 'அனைத்து கேள்விகளும் முடிந்துவிட்டன! ↩ அழுத்தி மீண்டும் தொடங்கவும்.';
                message.className = 'success';
                nextBtn.disabled = true;
                currentData = null;
                return;
            }

            const sentence = shuffledSentences[currentQuestionIndex];
            currentQuestionIndex++;
            const matches = [...sentence.matchAll(/\/([^/]+)\//g)].map(m => m[1]);
            const modified = sentence.replace(/\/([^/]+)\//g, '__');
            currentData = { sentence: modified, answers: matches };
        }

        function renderQuiz() {
            // currentData இல்லையெனில் (அறிவிக்கபட்டது) ஏதுவும் வரையாதே
            if (!currentData) return;

            selectedBlank = null;
            message.textContent = '';
            message.className = '';
            paragraphDiv.innerHTML = '';
            wordChunksDiv.innerHTML = '';
            wordUsage.clear();

            const sentence = currentData.sentence;
            const answers = currentData.answers;

            const parts = sentence.split('__');
            let lineDiv = document.createElement('div');
            lineDiv.className = 'line';

            for (let i = 0; i < parts.length; i++) {
                lineDiv.appendChild(document.createTextNode(parts[i]));
                if (i < answers.length) {
                    const blankContainer = document.createElement('span');
                    blankContainer.className = 'blank-container';

                    const blankSpan = document.createElement('span');
                    blankSpan.className = 'blank';
                    blankSpan.setAttribute('data-index', i);
                    blankContainer.appendChild(blankSpan);

                    const markSpan = document.createElement('span');
                    markSpan.className = 'mark';
                    blankContainer.appendChild(markSpan);

                    lineDiv.appendChild(blankContainer);
                }
            }
            paragraphDiv.appendChild(lineDiv);

            const shuffledChunks = shuffleArray(answers.slice());
            for (let k = 0; k < shuffledChunks.length; k++) {
                const word = shuffledChunks[k];
                const wordDiv = document.createElement('div');
                wordDiv.className = 'word-chunk';
                wordDiv.setAttribute('data-word', word);
                wordDiv.textContent = word;
                wordChunksDiv.appendChild(wordDiv);
            }

            attachListeners();
        }

        function attachListeners() {
            const blanks = document.querySelectorAll('.blank');
            const chunks = document.querySelectorAll('.word-chunk');

            blanks.forEach(blank => {
                blank.addEventListener('click', () => {
                    if (blank.textContent.trim() !== '') {
                        blank.textContent = '';
                        const mark = blank.parentElement.querySelector('.mark');
                        if (mark) mark.textContent = '';
                        blank.classList.remove('correct', 'incorrect', 'selected');

                        if (wordUsage.has(blank)) {
                            const chunkElem = wordUsage.get(blank);
                            chunkElem.classList.remove('used');
                            chunkElem.style.pointerEvents = 'auto';
                            wordUsage.delete(blank);
                        }
                        selectedBlank = null;
                        message.textContent = '';
                        message.className = '';
                        return;
                    }
                    blanks.forEach(b => b.classList.remove('selected'));
                    selectedBlank = blank;
                    blank.classList.add('selected');
                });

                blank.addEventListener('dragover', e => e.preventDefault());
                blank.addEventListener('drop', e => {
                    e.preventDefault();
                    const word = e.dataTransfer.getData("text/plain");
                    if (!word) return;
                    if (wordUsage.has(blank)) {
                        const prevChunk = wordUsage.get(blank);
                        prevChunk.classList.remove('used');
                        prevChunk.style.pointerEvents = 'auto';
                        wordUsage.delete(blank);
                    }
                    blank.textContent = word;
                    blank.classList.remove('correct', 'incorrect');
                    const mark = blank.parentElement.querySelector('.mark');
                    if (mark) mark.textContent = '';
                    const chunkElem = [...document.querySelectorAll('.word-chunk')]
                        .find(c => c.getAttribute('data-word') === word && !c.classList.contains('used'));
                    if (chunkElem) {
                        chunkElem.classList.add('used');
                        chunkElem.style.pointerEvents = 'none';
                        wordUsage.set(blank, chunkElem);
                    }
                });
            });

            chunks.forEach(chunk => {
                chunk.style.pointerEvents = 'auto';
                chunk.setAttribute("draggable", "true");
                chunk.addEventListener("dragstart", e => {
                    e.dataTransfer.setData("text/plain", chunk.getAttribute("data-word"));
                });

                chunk.addEventListener('click', () => {
                    if (chunk.classList.contains('used')) return;
                    if (!selectedBlank) {
                        alert('முதலில் ஒரு இடத்தைத் தேர்ந்தெடுக்கவும்');
                        return;
                    }
                    if (wordUsage.has(selectedBlank)) {
                        const prevChunk = wordUsage.get(selectedBlank);
                        prevChunk.classList.remove('used');
                        prevChunk.style.pointerEvents = 'auto';
                        wordUsage.delete(selectedBlank);
                    }
                    selectedBlank.textContent = chunk.getAttribute('data-word');
                    chunk.classList.add('used');
                    chunk.style.pointerEvents = 'none';
                    wordUsage.set(selectedBlank, chunk);
                    selectedBlank = null;
                });
            });
        }

        function checkAnswers() {
            const blanks = document.querySelectorAll('.blank');
            const answers = currentData.answers;
            blanks.forEach((blank, i) => {
                const mark = blank.parentElement.querySelector('.mark');
                if (blank.textContent === answers[i]) {
                    blank.classList.add('correct');
                    blank.classList.remove('incorrect');
                    if (mark) mark.textContent = '✅';
                } else {
                    blank.classList.add('incorrect');
                    blank.classList.remove('correct');
                    if (mark) mark.textContent = '❌';
                }
            });
        }

        checkBtn.addEventListener('click', () => {
            if (!currentData) return;
            checkAnswers();
        });

        answerBtn.addEventListener('click', () => {
            if (!currentData) return;
            const blanks = document.querySelectorAll('.blank');
            const answers = currentData.answers;
            blanks.forEach((blank, i) => {
                blank.textContent = answers[i];
                blank.classList.remove('selected', 'incorrect');
                blank.classList.add('correct');
                const mark = blank.parentElement.querySelector('.mark');
                if (mark) mark.textContent = '✅';
            });
            document.querySelectorAll('.word-chunk').forEach(c => {
                c.classList.add('used');
                c.style.pointerEvents = 'none';
            });
            wordUsage.clear();
            selectedBlank = null;
            message.className = 'success';
        });

        resetBtn.addEventListener('click', () => {
            // முடிந்ததேல் பின்னர் ↩ அழுத்தினால் புதிய சுழற்சி (reshuffle) செய்து தொடங்கு
            if (nextBtn.disabled) {
                shuffledSentences = shuffleArray(sentences.slice());
                currentQuestionIndex = 0;
                nextBtn.disabled = false;
                message.textContent = '';
                message.className = '';
                prepareQuiz();
                renderQuiz();
                return;
            }

            const blanks = document.querySelectorAll('.blank');
            blanks.forEach(blank => {
                blank.textContent = '';
                blank.classList.remove('selected', 'correct', 'incorrect');
                const mark = blank.parentElement.querySelector('.mark');
                if (mark) mark.textContent = '';
            });
            wordUsage.forEach(chunk => {
                chunk.classList.remove('used');
                chunk.style.pointerEvents = 'auto';
            });
            wordUsage.clear();
            selectedBlank = null;
            message.textContent = '';
            message.className = '';
        });

        nextBtn.addEventListener('click', () => {
            wordUsage.clear();
            prepareQuiz();
            renderQuiz();
        });

        // தொடக்கம்
        prepareQuiz();
        renderQuiz();
    </script>
</body>

</html>
