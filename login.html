<!DOCTYPE html>
<html lang="ta">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>உள்நுழைவு / Sign In - தமிழ். இனிது. எளிது.</title>
  <link rel="stylesheet" href="/css/auth.css?v=20260723" />
  <!-- Firebase Web SDK v10 (Compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4338ca 100%);
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .login-page-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .login-standalone-card {
      background: #ffffff;
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .login-card-brand {
      text-align: center;
      margin-bottom: 24px;
    }
    .login-card-brand-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      background: #4f46e5;
      color: #fff;
      font-size: 2.2rem;
      border-radius: 14px;
      margin-bottom: 12px;
      box-shadow: 0 6px 16px rgba(79, 70, 229, 0.4);
    }
    .login-card-brand h2 {
      margin: 0 0 6px 0;
      font-size: 1.5rem;
      color: #1e1b4b;
    }
    .login-card-brand p {
      margin: 0;
      color: #64748b;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>

  <div class="login-page-container">
    <div class="login-standalone-card">
      
      <div class="login-card-brand">
        <div class="login-card-brand-logo">த</div>
        <h2 id="login-heading">உள்நுழைவு / Sign In</h2>
        <p id="login-subheading">தமிழ் கற்றல் கணக்கில் உள்நுழையவும்</p>
      </div>

      <!-- Language Toggle Switch -->
      <div style="display:flex; justify-content:center; margin-bottom:20px;">
        <button id="btn-lang-toggle" class="lang-toggle-btn" style="background:#f1f5f9; color:#1e1b4b; border:1px solid #cbd5e1;" onclick="toggleLang()">
          🇬🇧 Switch to English
        </button>
      </div>

      <div class="auth-tabs">
        <button id="pg-tab-btn-login" class="auth-tab-btn active" onclick="switchPageTab('login')">உள்நுழைவு</button>
        <button id="pg-tab-btn-register" class="auth-tab-btn" onclick="switchPageTab('register')">பதிவு செய்க</button>
      </div>

      <div id="pg-auth-alert" class="auth-alert"></div>

      <!-- Login Form -->
      <form id="pg-form-login" onsubmit="handlePageLogin(event)">
        <div class="auth-form-group">
          <label id="lbl-email">மின்னஞ்சல் முகவரி</label>
          <input type="email" id="pg-login-email" class="auth-form-input" placeholder="student@tamilapp.com" required />
        </div>
        <div class="auth-form-group">
          <label id="lbl-password">கடவுச்சொல்</label>
          <input type="password" id="pg-login-password" class="auth-form-input" placeholder="••••••••" required />
        </div>
        <button type="submit" id="btn-submit-login" class="auth-submit-btn">உள்நுழைவு</button>
      </form>

      <!-- Register Form -->
      <form id="pg-form-register" style="display:none;" onsubmit="handlePageRegister(event)">
        <div class="auth-form-group">
          <label id="lbl-name">பெயர்</label>
          <input type="text" id="pg-reg-name" class="auth-form-input" placeholder="உங்கள் பெயர்" required />
        </div>
        <div class="auth-form-group">
          <label id="lbl-reg-email">மின்னஞ்சல் முகவரி</label>
          <input type="email" id="pg-reg-email" class="auth-form-input" placeholder="user@example.com" required />
        </div>
        <div class="auth-form-group">
          <label id="lbl-reg-password">கடவுச்சொல்</label>
          <input type="password" id="pg-reg-password" class="auth-form-input" placeholder="••••••••" required />
        </div>
        <button type="submit" id="btn-submit-register" class="auth-submit-btn">பதிவு செய்க</button>
      </form>

      <!-- Demo Accounts Box -->
      <div class="demo-accounts-box">
        <h4 id="lbl-demo-title">விரைவு சோதனை கணக்குகள் (Demo Accounts):</h4>
        <div class="demo-btn-group">
          <button type="button" class="demo-btn" onclick="fillPageDemo('student@tamilapp.com', 'student123')">🎓 மாணவர் (Learner)</button>
          <button type="button" class="demo-btn" onclick="fillPageDemo('teacher@tamilapp.com', 'teacher123')">📘 ஆசிரியர் (Teacher)</button>
          <button type="button" class="demo-btn" onclick="fillPageDemo('admin@tamilapp.com', 'admin123')">👑 நிர்வாகி (Admin)</button>
        </div>
      </div>

    </div>
  </div>

  <script src="/js/auth.js?v=20260723"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      applyLanguageUI();
    });

    function toggleLang() {
      const current = TamilAuth.getLang();
      const next = current === 'ta' ? 'en' : 'ta';
      TamilAuth.setLanguage(next);
    }

    function applyLanguageUI() {
      const isEn = TamilAuth.getLang() === 'en';
      document.getElementById('btn-lang-toggle').innerText = isEn ? '🇮🇳 தமிழ் மொழிக்கு மாற்றவும்' : '🇬🇧 Switch to English';
      document.getElementById('login-heading').innerText = isEn ? 'Sign In' : 'உள்நுழைவு';
      document.getElementById('login-subheading').innerText = isEn ? 'Sign in to access your Tamil learning portal' : 'தமிழ் கற்றல் கணக்கில் உள்நுழையவும்';
      document.getElementById('pg-tab-btn-login').innerText = isEn ? 'Sign In' : 'உள்நுழைவு';
      document.getElementById('pg-tab-btn-register').innerText = isEn ? 'Sign Up' : 'பதிவு செய்க';
      document.getElementById('lbl-email').innerText = isEn ? 'Email Address' : 'மின்னஞ்சல் முகவரி';
      document.getElementById('lbl-password').innerText = isEn ? 'Password' : 'கடவுச்சொல்';
      document.getElementById('btn-submit-login').innerText = isEn ? 'Sign In' : 'உள்நுழைவு';
      document.getElementById('lbl-name').innerText = isEn ? 'Full Name' : 'பெயர்';
      document.getElementById('lbl-reg-email').innerText = isEn ? 'Email Address' : 'மின்னஞ்சல் முகவரி';
      document.getElementById('lbl-reg-password').innerText = isEn ? 'Password' : 'கடவுச்சொல்';
      document.getElementById('btn-submit-register').innerText = isEn ? 'Sign Up' : 'பதிவு செய்க';
      document.getElementById('lbl-demo-title').innerText = isEn ? 'Quick Demo Accounts:' : 'விரைவு சோதனை கணக்குகள் (Demo Accounts):';
    }

    function switchPageTab(tab) {
      const loginForm = document.getElementById('pg-form-login');
      const regForm = document.getElementById('pg-form-register');
      const loginTab = document.getElementById('pg-tab-btn-login');
      const regTab = document.getElementById('pg-tab-btn-register');

      if (tab === 'login') {
        loginForm.style.display = 'block';
        regForm.style.display = 'none';
        loginTab.classList.add('active');
        regTab.classList.remove('active');
      } else {
        loginForm.style.display = 'none';
        regForm.style.display = 'block';
        regTab.classList.add('active');
        loginTab.classList.remove('active');
      }
    }

    function fillPageDemo(email, pass) {
      switchPageTab('login');
      document.getElementById('pg-login-email').value = email;
      document.getElementById('pg-login-password').value = pass;
    }

    function handlePageLogin(e) {
      e.preventDefault();
      const email = document.getElementById('pg-login-email').value;
      const pass = document.getElementById('pg-login-password').value;
      const res = TamilAuth.login(email, pass);

      const alertBox = document.getElementById('pg-auth-alert');
      if (res.success) {
        alertBox.className = 'auth-alert show auth-alert-success';
        alertBox.innerText = TamilAuth.t('loginSuccess');
        setTimeout(() => {
          if (res.user.role === 'teacher') window.location.href = 'teacher-dashboard.html';
          else if (res.user.role === 'learner') window.location.href = 'learner-dashboard.html';
          else if (res.user.role === 'admin') window.location.href = 'admin.html';
          else window.location.href = 'index.html';
        }, 600);
      } else {
        alertBox.className = 'auth-alert show auth-alert-error';
        alertBox.innerText = res.message;
      }
    }

    function handlePageRegister(e) {
      e.preventDefault();
      const name = document.getElementById('pg-reg-name').value;
      const email = document.getElementById('pg-reg-email').value;
      const pass = document.getElementById('pg-reg-password').value;
      const res = TamilAuth.register(name, email, pass, 'guest');

      const alertBox = document.getElementById('pg-auth-alert');
      if (res.success) {
        alertBox.className = 'auth-alert show auth-alert-success';
        alertBox.innerText = res.message;
        setTimeout(() => switchPageTab('login'), 1000);
      } else {
        alertBox.className = 'auth-alert show auth-alert-error';
        alertBox.innerText = res.message;
      }
    }
  </script>
</body>

</html>
