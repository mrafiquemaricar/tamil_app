<!DOCTYPE html>
<html lang="ta">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>உள்நுழைவு - தமிழ். இனிது. எளிது.</title>
  <link rel="stylesheet" href="css/auth.css" />
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f9;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .login-hero {
      max-width: 480px;
      margin: 50px auto;
      background: #ffffff;
      padding: 32px;
      border-radius: 16px;
      box-shadow: var(--auth-shadow);
      text-align: center;
      border: 1px solid var(--auth-border);
    }

    .login-hero h1 {
      color: #312e81;
      margin-bottom: 8px;
    }

    .login-hero p {
      color: #6b7280;
      margin-bottom: 24px;
    }
  </style>
</head>

<body>

  <main>
    <div class="login-hero">
      <h1>தமிழ். இனிது. எளிது.</h1>
      <p>கற்றல் தளத்திற்கு நல்வரவு! தொடர உள்நுழையவும்.</p>
      
      <button class="header-btn" style="background:#4f46e5; color:#fff; padding:12px 24px; font-size:1rem; width:100%; justify-content:center;" onclick="TamilAuth.openModal('login')">
        🔑 உள்நுழைய / பதிவு செய்ய
      </button>

      <div style="margin-top: 16px;">
        <a href="index.html" style="color:#6b7280; text-decoration:none; font-size:0.9rem;">🏠 விருந்தினராக முகப்பிற்கு செல்ல</a>
      </div>
    </div>
  </main>

  <script src="js/auth.js"></script>
  <script>
    TamilAuth.initPage();
    // Auto open modal on login page
    document.addEventListener('DOMContentLoaded', () => {
      TamilAuth.openModal('login');
    });
  </script>
</body>

</html>
